<!DOCTYPE html>
<html data-theme="black" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>MyOC Size Tool</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/theme/black.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --ink: #f8f8f2;
            --muted: #a7a7a2;
            --paper: #000;
            --panel: #070707;
            --panel-soft: #101010;
            --line: rgba(255, 255, 255, 0.72);
            --line-soft: rgba(255, 255, 255, 0.16);
            --accent: #38f5d4;
            --accent-warm: #ff4d4d;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            background: var(--paper);
            color: var(--ink);
            font-family: "Trebuchet MS", Verdana, sans-serif;
        }

        body {
            min-width: 320px;
        }

        button,
        input {
            font: inherit;
        }

        .chart-character,
        .chart-label,
        .roster-thumb,
        .roster-meta {
            appearance: none;
            border: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
        }

        .navbar {
            background: #050505;
        }

        .size-page {
            min-height: calc(100vh - 65px);
            padding: clamp(1rem, 2vw, 2rem);
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.065) 1px, transparent 1px),
                linear-gradient(180deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                #000;
            background-size: 64px 64px;
        }

        .tool-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .tool-title {
            margin: 0;
            font-family: inherit;
            font-size: clamp(1.8rem, 3vw, 3rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .unit-toggle {
            display: inline-grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: #050505;
        }

        .unit-toggle button,
        .upload-control,
        .save-control,
        .icon-button {
            min-height: 2.75rem;
            border: 0;
            color: var(--ink);
            background: transparent;
            cursor: pointer;
        }

        .unit-toggle button {
            min-width: 5.5rem;
            padding: 0 1rem;
            font-weight: 700;
        }

        .unit-toggle button.is-active {
            background: var(--ink);
            color: #000;
        }

        .upload-control,
        .save-control {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: #050505;
            font-weight: 700;
        }

        .upload-control:hover,
        .save-control:hover,
        .icon-button:hover,
        .roster-item:hover {
            border-color: rgba(255, 255, 255, 0.62);
        }

        .save-control.is-saved {
            border-color: rgba(56, 245, 212, 0.78);
            color: var(--accent);
        }

        .upload-control input {
            position: absolute;
            inline-size: 1px;
            block-size: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .tool-shell {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 390px);
            gap: 1rem;
            align-items: start;
        }

        .chart-panel,
        .control-panel {
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.38);
        }

        .chart-panel {
            min-width: 0;
            overflow: hidden;
        }

        .chart-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.85rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            background: #030303;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .chart-status strong {
            color: var(--ink);
            font-size: 1rem;
        }

        .chart-scroller {
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior: auto;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(180deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                #000;
            background-size: 64px 64px;
        }

        .chart-content {
            position: relative;
            width: 100%;
            min-width: 100%;
        }

        .chart-plot {
            position: relative;
            height: clamp(460px, 67vh, 820px);
            min-height: 420px;
            overflow: visible;
        }

        .grid-line {
            position: absolute;
            right: 0;
            left: 0;
            height: 1px;
            transform: translateY(50%);
            background: var(--line);
            pointer-events: none;
        }

        .grid-line.is-zero {
            height: 2px;
            background: rgba(255, 255, 255, 0.92);
        }

        .grid-line span {
            position: sticky;
            left: 0;
            display: inline-flex;
            align-items: center;
            min-width: 4.5rem;
            padding: 0.1rem 0.45rem 0.16rem 0.8rem;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.88);
            color: var(--ink);
            font-size: 0.82rem;
            font-weight: 800;
            line-height: 1;
        }

        .characters-layer {
            position: absolute;
            inset: 0;
        }

        .chart-character {
            position: absolute;
            top: 0;
            bottom: 0;
            padding: 0;
            pointer-events: none;
        }

        .chart-character.is-selected .chart-sprite {
            filter: drop-shadow(0 0 0.75rem rgba(56, 245, 212, 0.34));
        }

        .chart-sprite {
            position: absolute;
            max-width: none;
            object-fit: contain;
            object-position: center bottom;
            user-select: none;
            pointer-events: none;
        }

        .hover-measurement-line {
            position: absolute;
            z-index: 100000;
            display: none;
            height: 1px;
            transform: translateY(50%);
            background: repeating-linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.98) 0,
                rgba(255, 255, 255, 0.98) 8px,
                transparent 8px,
                transparent 13px
            );
            filter: drop-shadow(0 0 0.35rem rgba(0, 0, 0, 0.9));
            pointer-events: none;
        }

        .hover-measurement-line span {
            position: absolute;
            right: 0;
            bottom: 0.25rem;
            padding: 0.16rem 0.35rem;
            background: rgba(0, 0, 0, 0.9);
            color: var(--ink);
            font-size: 0.75rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .chart-label-row {
            position: relative;
            min-height: 3.9rem;
        }

        .chart-label {
            position: absolute;
            top: 0;
            display: grid;
            gap: 0.2rem;
            justify-items: center;
            padding: 0.5rem 0.4rem 0.8rem;
            text-align: center;
            z-index: 1;
        }

        .chart-label strong {
            max-width: 100%;
            overflow: hidden;
            color: var(--ink);
            font-size: 0.88rem;
            line-height: 1.15;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chart-label span {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .control-panel {
            display: grid;
            gap: 1rem;
            padding: 1rem;
        }

        .panel-section {
            display: grid;
            gap: 0.75rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .roster {
            display: grid;
            gap: 0.55rem;
            max-height: 16rem;
            overflow: auto;
            padding-right: 0.15rem;
        }

        .roster-item {
            display: grid;
            grid-template-columns: 3.2rem minmax(0, 1fr) auto;
            align-items: center;
            gap: 0.65rem;
            width: 100%;
            padding: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: var(--panel);
            color: var(--ink);
            text-align: left;
        }

        .roster-item.is-selected {
            border-color: rgba(56, 245, 212, 0.78);
            background: rgba(56, 245, 212, 0.08);
        }

        .roster-thumb {
            width: 3.2rem;
            height: 3.2rem;
            overflow: hidden;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: #000;
        }

        .roster-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .roster-meta {
            min-width: 0;
            padding: 0;
            text-align: left;
        }

        .roster-meta strong,
        .roster-meta span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .roster-meta strong {
            font-size: 0.95rem;
        }

        .roster-meta span {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .icon-button {
            display: inline-grid;
            place-items: center;
            width: 2.45rem;
            height: 2.45rem;
            min-height: 2.45rem;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.04);
        }

        .roster-actions {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .roster-actions .icon-button {
            width: 2rem;
            height: 2rem;
            min-height: 2rem;
        }

        .icon-button[data-remove] {
            color: #ff9b9b;
        }

        .icon-button:disabled {
            opacity: 0.32;
            cursor: not-allowed;
        }

        .editor {
            display: grid;
            gap: 0.85rem;
        }

        .field {
            display: grid;
            gap: 0.4rem;
        }

        .field span,
        .range-head {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .text-input,
        .number-input {
            width: 100%;
            min-height: 2.65rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 0;
            background: var(--panel-soft);
            color: var(--ink);
            outline: none;
            padding: 0.55rem 0.65rem;
        }

        .text-input:focus,
        .number-input:focus {
            border-color: rgba(56, 245, 212, 0.78);
            box-shadow: 0 0 0 2px rgba(56, 245, 212, 0.14);
        }

        .height-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.55rem;
        }

        .height-grid.metric {
            grid-template-columns: 1fr;
        }

        .switch-field {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            min-height: 2.75rem;
            padding: 0.55rem 0.65rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: var(--panel-soft);
            color: var(--ink);
            font-weight: 800;
        }

        .switch-field input {
            width: 2.85rem;
            height: 1.45rem;
            margin: 0;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .height-input {
            position: relative;
        }

        .height-input small {
            position: absolute;
            top: 50%;
            right: 0.65rem;
            transform: translateY(-50%);
            color: var(--muted);
            font-weight: 900;
        }

        .height-input .number-input {
            padding-right: 2.2rem;
        }

        .calibration-frame {
            position: relative;
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background:
                linear-gradient(45deg, rgba(255, 255, 255, 0.055) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.055) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.055) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.055) 75%),
                #050505;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-size: 20px 20px;
        }

        .calibration-frame img {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 22rem;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .cal-line {
            position: absolute;
            right: 0;
            left: 0;
            z-index: 2;
            height: 0;
            border-top: 2px solid var(--accent);
            color: var(--accent);
            cursor: ns-resize;
            touch-action: none;
        }

        .cal-line[data-marker="bottom"] {
            border-color: var(--accent-warm);
            color: var(--accent-warm);
        }

        .cal-line::before {
            position: absolute;
            top: -0.55rem;
            left: 50%;
            width: 1.1rem;
            height: 1.1rem;
            content: "";
            transform: translateX(-50%);
            border: 2px solid #000;
            border-radius: 999px;
            background: currentColor;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.8);
        }

        .cal-line span {
            position: absolute;
            top: -1.55rem;
            left: 0.5rem;
            padding: 0.12rem 0.35rem;
            background: rgba(0, 0, 0, 0.82);
            color: var(--ink);
            font-size: 0.72rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .range-grid {
            display: grid;
            gap: 0.65rem;
        }

        .range-row {
            display: grid;
            gap: 0.35rem;
        }

        .range-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        input[data-calibration="bottom"] {
            accent-color: var(--accent-warm);
        }

        .empty-state {
            display: grid;
            place-items: center;
            min-height: 14rem;
            border: 1px dashed rgba(255, 255, 255, 0.26);
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 1060px) {
            .tool-shell {
                grid-template-columns: 1fr;
            }

            .control-panel {
                grid-template-columns: minmax(0, 1fr) minmax(280px, 0.8fr);
            }
        }

        @media (max-width: 720px) {
            .size-page {
                padding: 0.75rem;
            }

            .tool-header {
                align-items: stretch;
                flex-direction: column;
            }

            .toolbar {
                justify-content: stretch;
            }

            .unit-toggle,
            .upload-control,
            .save-control {
                flex: 1 1 auto;
            }

            .unit-toggle button {
                min-width: 0;
            }

            .chart-status {
                align-items: start;
                flex-direction: column;
            }

            .chart-plot {
                height: 62vh;
                min-height: 390px;
            }

            .control-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="min-h-screen bg-base-100 text-base-content">

<div class="navbar border-b border-base-300 px-6">
    <div class="flex-1">
        <a class="text-xl font-bold">MyOC</a>
    </div>

    <div class="flex-none w-full max-w-md mx-6">
        <label class="input input-bordered w-full">
            <svg class="h-4 w-4 opacity-60"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M21 21l-4.35-4.35M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"/>
            </svg>
            <input
                    class="grow"
                    placeholder="Search characters, artists, tags..."
                    type="search"
            />
        </label>
    </div>

    <div class="flex-none">
        <details class="dropdown dropdown-end">
            <summary class="btn btn-ghost btn-circle avatar">
                <div class="w-10 rounded-full">
                    <img
                            alt="Profile"
                            src="https://ui-avatars.com/api/?name=R&background=ff0000&color=ffffff"
                    />
                </div>
            </summary>

            <ul class="menu dropdown-content bg-base-100 rounded-box z-50 mt-3 w-56 p-2 shadow">
                <li><a>Characters</a></li>
                <li><a>Settings</a></li>

                <div class="divider my-1"></div>

                <li><a class="text-error">Logout</a></li>
            </ul>
        </details>
    </div>
</div>

<main class="size-page">
    <header class="tool-header">
        <h1 class="tool-title">Size Chart</h1>
        <div class="toolbar">
            <div aria-label="Units" class="unit-toggle">
                <button class="is-active" data-unit="imperial" type="button">ft/in</button>
                <button data-unit="metric" type="button">m</button>
            </div>
            <label class="upload-control" title="Upload PNG">
                <i data-lucide="upload"></i>
                <span>Upload PNG</span>
                <input accept="image/png,image/*" data-upload multiple type="file">
            </label>
            <button class="save-control" data-save type="button" title="Prepare save JSON">
                <i data-lucide="save"></i>
                <span data-save-label>Save</span>
            </button>
        </div>
    </header>

    <div class="tool-shell">
        <section class="chart-panel" aria-label="Character height chart">
            <div class="chart-status">
                <strong id="chartRange">0'0" - 0'0"</strong>
                <span id="chartCount">0 characters</span>
            </div>
            <div class="chart-scroller" id="chartScroller">
                <div class="chart-content" id="chartContent">
                    <div class="chart-plot" id="chartPlot"></div>
                    <div class="chart-label-row" id="chartLabels"></div>
                </div>
            </div>
        </section>

        <aside class="control-panel" aria-label="Character controls">
            <section class="panel-section">
                <div class="section-title">
                    <span>Characters</span>
                    <span id="rosterTotal"></span>
                </div>
                <div class="roster" id="roster"></div>
            </section>

            <section class="panel-section">
                <div class="section-title">
                    <span>Calibration</span>
                    <span id="selectedHeight"></span>
                </div>
                <div id="editor"></div>
            </section>
        </aside>
    </div>
</main>

<script>
    const INCHES_PER_METER = 39.37007874015748;
    const LABEL_GUTTER = 72;
    const CHART_SIDE_PAD = 18;
    const MIN_DRAWABLE_WIDTH = 140;
    const LABEL_GAP = 3;
    const MAX_LAYER = 99;
    const ALPHA_HIT_THRESHOLD = 20;

    const SIZE_TOOL_JSON = {
        settings: {
            displayUnit: "imperial",
            selectedCharacterId: "raz-front"
        },
        characters: [
            {
                id: "raz-front",
                name: "Raz_Front",
                image: {
                    src: "../assets/Raz_Front%20copy%202.png",
                    naturalWidth: 2886,
                    naturalHeight: 3118
                },
                height: {
                    meters: 2.54
                },
                calibration: {
                    headYPercent: 7,
                    footYPercent: 97
                },
                placement: {
                    xPercent: 62,
                    layer: 2
                },
                transform: {
                    flipHorizontal: false
                }
            },
            {
                id: "layer-5",
                name: "Layer 5",
                image: {
                    src: "../assets/Layer%205.png",
                    naturalWidth: 3928,
                    naturalHeight: 4179
                },
                height: {
                    meters: 1.2192
                },
                calibration: {
                    headYPercent: 17,
                    footYPercent: 95
                },
                placement: {
                    xPercent: 34,
                    layer: 1
                },
                transform: {
                    flipHorizontal: false
                }
            }
        ]
    };

    const state = createStateFromSizeToolJson(SIZE_TOOL_JSON);

    const els = {
        chartScroller: document.getElementById("chartScroller"),
        chartContent: document.getElementById("chartContent"),
        chartPlot: document.getElementById("chartPlot"),
        chartLabels: document.getElementById("chartLabels"),
        chartRange: document.getElementById("chartRange"),
        chartCount: document.getElementById("chartCount"),
        roster: document.getElementById("roster"),
        rosterTotal: document.getElementById("rosterTotal"),
        editor: document.getElementById("editor"),
        selectedHeight: document.getElementById("selectedHeight")
    };

    const alphaMasks = new Map();
    let currentChartLayout = null;
    let SIZE_TOOL_SAVE_JSON = null;
    let SIZE_TOOL_SAVE_BODY = "";

    function escapeHtml(value) {
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
    }

    function normalizedDisplayUnit(unit) {
        return unit === "metric" ? "metric" : "imperial";
    }

    function createCharacterFromJson(character, index) {
        const image = character.image || {};
        const height = character.height || {};
        const calibration = character.calibration || {};
        const placement = character.placement || {};
        const transform = character.transform || {};
        const id = character.id || `character-${index + 1}`;

        return {
            id,
            name: character.name || "Character",
            src: image.src || "",
            naturalWidth: Math.max(1, Number(image.naturalWidth) || Number(image.width) || 1),
            naturalHeight: Math.max(1, Number(image.naturalHeight) || Number(image.height) || 1),
            heightMeters: Math.max(0.01, Number(height.meters) || 1.52),
            topPct: clamp((Number(calibration.headYPercent) || 0) / 100, 0, 0.98),
            bottomPct: clamp((Number(calibration.footYPercent) || 100) / 100, 0.02, 1),
            flipped: Boolean(transform.flipHorizontal),
            xPct: clamp(Number(placement.xPercent) || 0, 0, 100),
            layer: clamp(Number(placement.layer) || index + 1, 1, MAX_LAYER)
        };
    }

    function createStateFromSizeToolJson(data) {
        const settings = data.settings || {};
        const characters = (data.characters || []).map(createCharacterFromJson);

        characters.forEach((character) => {
            if (character.topPct >= character.bottomPct) {
                character.topPct = clamp(character.bottomPct - 0.02, 0, 0.98);
            }
        });

        const selectedId = characters.some((character) => character.id === settings.selectedCharacterId)
            ? settings.selectedCharacterId
            : characters[0]?.id || "";

        return {
            unit: normalizedDisplayUnit(settings.displayUnit),
            selectedId,
            characters
        };
    }

    function createSizeToolJsonFromState() {
        return {
            settings: {
                displayUnit: state.unit,
                selectedCharacterId: state.selectedId
            },
            characters: state.characters.map((character) => ({
                id: character.id,
                name: character.name,
                image: {
                    src: character.src,
                    naturalWidth: character.naturalWidth,
                    naturalHeight: character.naturalHeight
                },
                height: {
                    meters: Number(character.heightMeters.toFixed(4))
                },
                calibration: {
                    headYPercent: Number((character.topPct * 100).toFixed(2)),
                    footYPercent: Number((character.bottomPct * 100).toFixed(2))
                },
                placement: {
                    xPercent: Number(characterXPct(character).toFixed(2)),
                    layer: characterLayer(character)
                },
                transform: {
                    flipHorizontal: Boolean(character.flipped)
                }
            }))
        };
    }

    function syncSavePayload() {
        SIZE_TOOL_SAVE_JSON = createSizeToolJsonFromState();
        SIZE_TOOL_SAVE_BODY = JSON.stringify(SIZE_TOOL_SAVE_JSON);
        window.SIZE_TOOL_SAVE_JSON = SIZE_TOOL_SAVE_JSON;
        window.SIZE_TOOL_SAVE_BODY = SIZE_TOOL_SAVE_BODY;
    }

    function markSaveReady() {
        const saveButton = document.querySelector("[data-save]");
        const saveLabel = document.querySelector("[data-save-label]");
        if (!saveButton || !saveLabel) {
            return;
        }

        saveButton.classList.add("is-saved");
        saveLabel.textContent = "Saved";
        window.setTimeout(() => {
            saveButton.classList.remove("is-saved");
            saveLabel.textContent = "Save";
        }, 1400);
    }

    function selectedCharacter() {
        return state.characters.find((character) => character.id === state.selectedId) || state.characters[0] || null;
    }

    function characterLayer(character) {
        return clamp(Number(character.layer) || 1, 1, MAX_LAYER);
    }

    function characterXPct(character) {
        const xPct = Number(character.xPct);
        return clamp(Number.isFinite(xPct) ? xPct : 50, 0, 100);
    }

    function layeredCharacters() {
        return state.characters
            .map((character, index) => ({ character, index }))
            .sort((a, b) => characterLayer(b.character) - characterLayer(a.character) || a.index - b.index)
            .map((item) => item.character);
    }

    function alphabeticalCharacters() {
        return state.characters
            .map((character, index) => ({ character, index }))
            .sort((a, b) => {
                const nameCompare = a.character.name.localeCompare(b.character.name, undefined, { sensitivity: "base" });
                return nameCompare || a.index - b.index;
            })
            .map((item) => item.character);
    }

    function maxCharacterLayer() {
        return Math.max(0, ...state.characters.map(characterLayer));
    }

    function measuredPixels(character) {
        const top = character.topPct * character.naturalHeight;
        const bottom = character.bottomPct * character.naturalHeight;
        return Math.max(1, bottom - top);
    }

    function imageWidthMeters(character) {
        return (character.naturalWidth * character.heightMeters) / measuredPixels(character);
    }

    function visibleTopMeters(character) {
        const topPixels = character.topPct * character.naturalHeight;
        return character.heightMeters + (topPixels / measuredPixels(character)) * character.heightMeters;
    }

    function roundChartMaxMeters(visibleMax) {
        if (state.unit === "metric") {
            return Math.max(2, Math.ceil(visibleMax * 2) / 2);
        }

        const maxFeet = visibleMax * INCHES_PER_METER / 12;
        return Math.max(60 / INCHES_PER_METER, Math.ceil(maxFeet) * 12 / INCHES_PER_METER);
    }

    function visibleChartMaxMeters() {
        return Math.max(60 / INCHES_PER_METER, ...state.characters.map(visibleTopMeters));
    }

    function ensureAlphaMask(character) {
        const existing = alphaMasks.get(character.id);
        if (existing) {
            return existing;
        }

        const mask = {
            status: "loading",
            width: 0,
            height: 0,
            alpha: null
        };
        alphaMasks.set(character.id, mask);

        const image = new Image();
        image.onload = () => {
            try {
                const width = image.naturalWidth || character.naturalWidth;
                const height = image.naturalHeight || character.naturalHeight;
                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d", { willReadFrequently: true });
                canvas.width = width;
                canvas.height = height;
                context.drawImage(image, 0, 0, width, height);

                const rgba = context.getImageData(0, 0, width, height).data;
                const alpha = new Uint8Array(width * height);
                for (let sourceIndex = 3, targetIndex = 0; sourceIndex < rgba.length; sourceIndex += 4, targetIndex += 1) {
                    alpha[targetIndex] = rgba[sourceIndex];
                }

                mask.status = "ready";
                mask.width = width;
                mask.height = height;
                mask.alpha = alpha;
            } catch (error) {
                mask.status = "failed";
                mask.error = error;
            }
        };
        image.onerror = () => {
            mask.status = "failed";
        };
        image.src = character.src;

        return mask;
    }

    function isOpaqueImagePixel(item, imageX, imageY) {
        const mask = ensureAlphaMask(item.character);
        if (mask.status !== "ready" || !mask.alpha) {
            return false;
        }

        const xRatio = clamp(imageX / item.imageWidth, 0, 1);
        const yRatio = clamp(imageY / item.imageHeight, 0, 1);
        const sourceXRatio = item.character.flipped ? 1 - xRatio : xRatio;
        const sourceX = clamp(Math.floor(sourceXRatio * mask.width), 0, mask.width - 1);
        const sourceY = clamp(Math.floor(yRatio * mask.height), 0, mask.height - 1);

        return mask.alpha[sourceY * mask.width + sourceX] > ALPHA_HIT_THRESHOLD;
    }

    function chartHitTest(clientX, clientY) {
        if (!currentChartLayout) {
            return null;
        }

        const rect = els.chartPlot.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const plotHeight = els.chartPlot.clientHeight || 0;
        const maxHitY = plotHeight + currentChartLayout.maxBottomExcess;
        if (x < 0 || x > rect.width || y < 0 || y > maxHitY) {
            return null;
        }

        const candidates = currentChartLayout.items
            .map((item, index) => ({ item, index }))
            .sort((a, b) => b.item.layer - a.item.layer || b.index - a.index);

        for (const candidate of candidates) {
            const item = candidate.item;
            const imageTop = plotHeight + item.bottomExcess - item.imageHeight;
            const imageX = x - item.left;
            const imageY = y - imageTop;
            if (imageX < 0 || imageX > item.imageWidth || imageY < 0 || imageY > item.imageHeight) {
                continue;
            }

            if (isOpaqueImagePixel(item, imageX, imageY)) {
                return item;
            }
        }

        return null;
    }

    function formatHeight(meters) {
        if (state.unit === "metric") {
            return `${meters.toFixed(2)} m`;
        }

        const inches = meters * INCHES_PER_METER;
        const rounded = Math.max(0, Math.round(inches));
        const feet = Math.floor(rounded / 12);
        const remainingInches = rounded % 12;
        return `${feet}'${remainingInches}"`;
    }

    function imperialParts(meters) {
        const inches = meters * INCHES_PER_METER;
        const rounded = Math.max(1, Math.round(inches));
        return {
            feet: Math.floor(rounded / 12),
            inches: rounded % 12
        };
    }

    function niceStep(rawStep, candidates) {
        return candidates.find((candidate) => candidate >= rawStep) || candidates[candidates.length - 1];
    }

    function gridStep(maxMeters) {
        if (state.unit === "metric") {
            const baseLines = maxMeters / 0.5;
            const stepMeters = baseLines <= 18
                ? 0.5
                : niceStep(maxMeters / 14, [1, 2, 5, 10, 20, 50, 100, 200, 500]);

            return {
                meters: stepMeters,
                metricStep: stepMeters
            };
        }

        const maxFeet = maxMeters * INCHES_PER_METER / 12;
        const stepFeet = maxFeet <= 18
            ? 1
            : niceStep(maxFeet / 14, [2, 5, 10, 20, 50, 100, 200, 500]);

        return {
            meters: stepFeet * 12 / INCHES_PER_METER,
            imperialStep: stepFeet
        };
    }

    function gridLines(maxMeters) {
        const lines = [];
        const step = gridStep(maxMeters);

        if (state.unit === "metric") {
            for (let meters = 0; meters <= maxMeters + 0.001; meters += step.meters) {
                lines.push({
                    meters,
                    label: `${meters.toFixed(2)} m`,
                    zero: meters === 0
                });
            }
        } else {
            for (let meters = 0; meters <= maxMeters + 0.001; meters += step.meters) {
                const feet = Math.round(meters * INCHES_PER_METER / 12);
                lines.push({
                    meters,
                    label: `${feet}'0"`,
                    zero: meters === 0
                });
            }
        }

        const last = lines[lines.length - 1];
        if (last && Math.abs(last.meters - maxMeters) > step.meters * 0.25) {
            lines.push({
                meters: maxMeters,
                label: formatHeight(maxMeters),
                zero: false
            });
        }

        return lines;
    }

    function resolveLabelPositions(items, minLeft, maxRight) {
        const labels = items
            .map((item, index) => ({
                item,
                index,
                width: item.labelWidth,
                desiredLeft: clamp(item.labelCenter - item.labelWidth / 2, minLeft, maxRight - item.labelWidth),
                center: item.labelCenter
            }))
            .sort((a, b) => a.center - b.center || a.index - b.index);

        let cursor = minLeft;
        labels.forEach((label) => {
            label.left = Math.max(label.desiredLeft, cursor);
            cursor = label.left + label.width + LABEL_GAP;
        });

        for (let index = labels.length - 1; index >= 0; index -= 1) {
            const label = labels[index];
            const rightLimit = index === labels.length - 1
                ? maxRight
                : labels[index + 1].left - LABEL_GAP;
            label.left = Math.min(label.left, rightLimit - label.width);
        }

        cursor = minLeft;
        labels.forEach((label) => {
            label.left = Math.max(label.left, cursor);
            label.item.labelLeft = label.left;
            cursor = label.left + label.width + LABEL_GAP;
        });
    }

    function chartLayout(plotHeight) {
        const contentWidth = Math.max(1, els.chartScroller.clientWidth || els.chartPlot.clientWidth || 900);
        const drawableLeft = LABEL_GUTTER;
        const drawableRight = Math.max(drawableLeft + MIN_DRAWABLE_WIDTH, contentWidth - CHART_SIDE_PAD);
        const drawableWidth = Math.max(MIN_DRAWABLE_WIDTH, drawableRight - drawableLeft);
        const usableWidth = Math.max(48, drawableWidth - 8);
        const widthRequiredMax = state.characters.reduce((requiredMax, character) => {
            const widthMeters = imageWidthMeters(character);
            return Math.max(requiredMax, (plotHeight * widthMeters) / usableWidth);
        }, 0);
        const maxMeters = roundChartMaxMeters(Math.max(visibleChartMaxMeters(), widthRequiredMax));
        const pxPerMeter = plotHeight / maxMeters;
        let maxBottomExcess = 0;

        const items = state.characters.map((character) => {
            const scale = (character.heightMeters * pxPerMeter) / measuredPixels(character);
            const imageWidth = Math.max(24, character.naturalWidth * scale);
            const imageHeight = Math.max(24, character.naturalHeight * scale);
            const measuredHeight = character.heightMeters * pxPerMeter;
            const bottomPixels = character.bottomPct * character.naturalHeight;
            const bottomExcess = Math.max(0, (character.naturalHeight - bottomPixels) * scale);
            const maxImageLeft = Math.max(drawableLeft, drawableRight - imageWidth);
            const imageTravel = Math.max(0, maxImageLeft - drawableLeft);
            const left = drawableLeft + (characterXPct(character) / 100) * imageTravel;
            const labelWidth = Math.min(132, Math.max(86, imageWidth));
            const labelCenter = left + imageWidth / 2;

            maxBottomExcess = Math.max(maxBottomExcess, bottomExcess);

            return {
                character,
                imageWidth,
                imageHeight,
                measuredHeight,
                bottomExcess,
                left,
                labelCenter,
                labelLeft: 0,
                labelWidth,
                layer: characterLayer(character)
            };
        });

        const labelSpace = Math.max(0, contentWidth - CHART_SIDE_PAD - drawableLeft);
        const fittedLabelWidth = items.length > 0
            ? Math.max(44, (labelSpace - LABEL_GAP * (items.length - 1)) / items.length)
            : 160;
        items.forEach((item) => {
            item.labelWidth = Math.min(item.labelWidth, fittedLabelWidth);
        });
        resolveLabelPositions(items, drawableLeft, contentWidth - CHART_SIDE_PAD);

        return {
            items,
            contentWidth,
            maxBottomExcess,
            pxPerMeter,
            maxMeters
        };
    }

    function renderChart() {
        const plotHeight = els.chartPlot.clientHeight || 640;
        const layout = chartLayout(plotHeight);
        const maxMeters = layout.maxMeters;
        currentChartLayout = layout;
        layout.items.forEach((item) => ensureAlphaMask(item.character));

        els.chartContent.style.width = "100%";
        els.chartLabels.style.width = "100%";
        els.chartLabels.style.marginTop = `${Math.ceil(layout.maxBottomExcess) + 12}px`;

        const gridHtml = gridLines(maxMeters).map((line) => {
            const bottom = line.meters * layout.pxPerMeter;
            return `
                <div class="grid-line ${line.zero ? "is-zero" : ""}" style="bottom: ${bottom}px">
                    <span>${escapeHtml(line.label)}</span>
                </div>
            `;
        }).join("");

        const charactersHtml = layout.items.map((item) => {
            const character = item.character;
            const selected = character.id === state.selectedId ? "is-selected" : "";
            return `
                <button
                    aria-label="${escapeHtml(character.name)}"
                    class="chart-character ${selected}"
                    data-chart-id="${escapeHtml(character.id)}"
                    style="left: ${item.left}px; width: ${item.imageWidth}px; z-index: ${item.layer}"
                    tabindex="-1"
                    type="button"
                >
                    <img
                        alt="${escapeHtml(character.name)}"
                        class="chart-sprite"
                        src="${escapeHtml(character.src)}"
                        style="
                            width: ${item.imageWidth}px;
                            height: ${item.imageHeight}px;
                            left: 0;
                            bottom: -${item.bottomExcess}px;
                            transform: ${character.flipped ? "scaleX(-1)" : "none"};
                        "
                    >
                </button>
            `;
        }).join("");

        const labelsHtml = layout.items.map((item) => {
            const character = item.character;
            return `
                <button
                    class="chart-label"
                    data-select="${escapeHtml(character.id)}"
                    style="left: ${item.labelLeft}px; width: ${item.labelWidth}px; z-index: ${item.layer}"
                    type="button"
                >
                    <strong>${escapeHtml(character.name)}</strong>
                    <span>${escapeHtml(formatHeight(character.heightMeters))}</span>
                </button>
            `;
        }).join("");

        els.chartPlot.innerHTML = `
            ${gridHtml}
            <div class="characters-layer">${charactersHtml}</div>
            <div class="hover-measurement-line" id="hoverMeasurementLine"><span></span></div>
        `;
        els.chartLabels.innerHTML = labelsHtml;
        els.chartRange.textContent = `0 - ${formatHeight(maxMeters)}`;
        els.chartCount.textContent = `${state.characters.length} ${state.characters.length === 1 ? "character" : "characters"}`;
    }

    function renderRoster() {
        els.rosterTotal.textContent = String(state.characters.length);

        if (state.characters.length === 0) {
            els.roster.innerHTML = `<div class="empty-state">Upload PNG</div>`;
            return;
        }

        const orderedCharacters = alphabeticalCharacters();
        const layerOrder = layeredCharacters();
        const topLayerId = layerOrder[0]?.id || "";
        const bottomLayerId = layerOrder[layerOrder.length - 1]?.id || "";

        els.roster.innerHTML = orderedCharacters.map((character) => {
            const selected = character.id === state.selectedId ? "is-selected" : "";
            return `
                <div class="roster-item ${selected}">
                    <button class="roster-thumb" data-select="${escapeHtml(character.id)}" type="button">
                        <img
                            alt="${escapeHtml(character.name)}"
                            src="${escapeHtml(character.src)}"
                            style="transform: ${character.flipped ? "scaleX(-1)" : "none"}"
                        >
                    </button>
                    <button class="roster-meta" data-select="${escapeHtml(character.id)}" type="button">
                        <strong>${escapeHtml(character.name)}</strong>
                        <span>${escapeHtml(formatHeight(character.heightMeters))} / layer ${characterLayer(character)}</span>
                    </button>
                    <div class="roster-actions">
                        <button class="icon-button" data-character-id="${escapeHtml(character.id)}" data-move="up" ${character.id === topLayerId ? "disabled" : ""} title="Layer up" type="button">
                            <i data-lucide="chevron-up"></i>
                        </button>
                        <button class="icon-button" data-character-id="${escapeHtml(character.id)}" data-move="down" ${character.id === bottomLayerId ? "disabled" : ""} title="Layer down" type="button">
                            <i data-lucide="chevron-down"></i>
                        </button>
                        <button class="icon-button" data-remove="${escapeHtml(character.id)}" title="Remove" type="button">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    function renderEditor() {
        const character = selectedCharacter();

        if (!character) {
            els.selectedHeight.textContent = "";
            els.editor.innerHTML = `<div class="empty-state">Upload PNG</div>`;
            return;
        }

        els.selectedHeight.textContent = formatHeight(character.heightMeters);
        const parts = imperialParts(character.heightMeters);
        const metricValue = character.heightMeters.toFixed(2);
        const xPosition = Math.round(characterXPct(character));
        const heightInputs = state.unit === "metric"
            ? `
                <div class="height-grid metric">
                    <label class="height-input">
                        <input class="number-input" data-height-meters min="0.01" step="0.01" type="number" value="${metricValue}">
                        <small>m</small>
                    </label>
                </div>
            `
            : `
                <div class="height-grid">
                    <label class="height-input">
                        <input class="number-input" data-height-feet min="0" step="1" type="number" value="${parts.feet}">
                        <small>ft</small>
                    </label>
                    <label class="height-input">
                        <input class="number-input" data-height-inches min="0" step="1" type="number" value="${parts.inches}">
                        <small>in</small>
                    </label>
                </div>
            `;

        els.editor.innerHTML = `
            <div class="editor">
                <label class="field">
                    <span>Name</span>
                    <input class="text-input" data-name type="text" value="${escapeHtml(character.name)}">
                </label>

                <label class="field">
                    <span>Height</span>
                    ${heightInputs}
                </label>

                <div class="range-grid">
                    <label class="range-row">
                        <span class="range-head">
                            <span>Left / Right</span>
                            <output id="xPct">${xPosition}%</output>
                        </span>
                        <input data-x-position max="100" min="0" step="1" type="range" value="${xPosition}">
                    </label>
                </div>

                <label class="switch-field">
                    <span>Flip horizontal</span>
                    <input data-flipped type="checkbox" ${character.flipped ? "checked" : ""}>
                </label>

                <div class="calibration-frame" data-calibration-frame>
                    <img
                        alt="${escapeHtml(character.name)} calibration"
                        src="${escapeHtml(character.src)}"
                        style="transform: ${character.flipped ? "scaleX(-1)" : "none"}"
                    >
                    <div class="cal-line" data-marker="top" style="top: ${character.topPct * 100}%">
                        <span>Head</span>
                    </div>
                    <div class="cal-line" data-marker="bottom" style="top: ${character.bottomPct * 100}%">
                        <span>Foot</span>
                    </div>
                </div>

                <div class="range-grid">
                    <label class="range-row">
                        <span class="range-head">
                            <span>Head</span>
                            <output id="headPct">${Math.round(character.topPct * 100)}%</output>
                        </span>
                        <input data-calibration="top" max="100" min="0" step="0.1" type="range" value="${character.topPct * 100}">
                    </label>
                    <label class="range-row">
                        <span class="range-head">
                            <span>Foot</span>
                            <output id="footPct">${Math.round(character.bottomPct * 100)}%</output>
                        </span>
                        <input data-calibration="bottom" max="100" min="0" step="0.1" type="range" value="${character.bottomPct * 100}">
                    </label>
                </div>
            </div>
        `;
    }

    function renderUnitToggle() {
        document.querySelectorAll("[data-unit]").forEach((button) => {
            button.classList.toggle("is-active", button.dataset.unit === state.unit);
        });
    }

    function renderAll() {
        renderUnitToggle();
        renderChart();
        renderRoster();
        renderEditor();
        if (window.lucide) {
            window.lucide.createIcons();
        }
    }

    function renderDataOnly() {
        renderChart();
        renderRoster();
        const character = selectedCharacter();
        els.selectedHeight.textContent = character ? formatHeight(character.heightMeters) : "";
        if (window.lucide) {
            window.lucide.createIcons();
        }
    }

    function hideHoverMeasurementLine() {
        const line = document.getElementById("hoverMeasurementLine");
        if (line) {
            line.style.display = "none";
        }
    }

    function showHoverMeasurementLine(item) {
        const line = document.getElementById("hoverMeasurementLine");
        if (!line) {
            return;
        }

        line.style.display = "block";
        line.style.left = `${item.left}px`;
        line.style.width = `${item.imageWidth}px`;
        line.style.bottom = `${item.measuredHeight}px`;

        const label = line.querySelector("span");
        if (label) {
            label.textContent = formatHeight(item.character.heightMeters);
        }
    }

    function updateChartPointer(event) {
        if (event.target.closest(".chart-label")) {
            els.chartContent.style.cursor = "default";
            hideHoverMeasurementLine();
            return;
        }

        const hit = chartHitTest(event.clientX, event.clientY);
        els.chartContent.style.cursor = hit ? "pointer" : "default";
        if (hit) {
            showHoverMeasurementLine(hit);
        } else {
            hideHoverMeasurementLine();
        }
    }

    function setCalibration(character, marker, valuePct) {
        const value = clamp(valuePct, 0, 1);
        if (marker === "top") {
            character.topPct = clamp(value, 0, character.bottomPct - 0.02);
        } else {
            character.bottomPct = clamp(value, character.topPct + 0.02, 1);
        }
    }

    function updateCalibrationUi(character) {
        const topLine = document.querySelector('[data-marker="top"]');
        const bottomLine = document.querySelector('[data-marker="bottom"]');
        const topRange = document.querySelector('[data-calibration="top"]');
        const bottomRange = document.querySelector('[data-calibration="bottom"]');
        const headOutput = document.getElementById("headPct");
        const footOutput = document.getElementById("footPct");

        if (topLine) {
            topLine.style.top = `${character.topPct * 100}%`;
        }
        if (bottomLine) {
            bottomLine.style.top = `${character.bottomPct * 100}%`;
        }
        if (topRange) {
            topRange.value = String(character.topPct * 100);
        }
        if (bottomRange) {
            bottomRange.value = String(character.bottomPct * 100);
        }
        if (headOutput) {
            headOutput.textContent = `${Math.round(character.topPct * 100)}%`;
        }
        if (footOutput) {
            footOutput.textContent = `${Math.round(character.bottomPct * 100)}%`;
        }
    }

    function setSelected(id) {
        if (!state.characters.some((character) => character.id === id)) {
            return;
        }
        state.selectedId = id;
        renderAll();
    }

    function removeCharacter(id) {
        const character = state.characters.find((item) => item.id === id);
        if (character && character.objectUrl) {
            URL.revokeObjectURL(character.objectUrl);
        }
        alphaMasks.delete(id);

        state.characters = state.characters.filter((item) => item.id !== id);
        if (state.selectedId === id) {
            state.selectedId = state.characters[0]?.id || "";
        }
        renderAll();
    }

    function moveCharacterLayer(id, direction) {
        const orderedCharacters = layeredCharacters();
        const fromIndex = orderedCharacters.findIndex((character) => character.id === id);
        if (fromIndex === -1) {
            return;
        }

        const toIndex = direction === "up" ? fromIndex - 1 : fromIndex + 1;
        if (toIndex < 0 || toIndex >= orderedCharacters.length) {
            return;
        }

        const [character] = orderedCharacters.splice(fromIndex, 1);
        orderedCharacters.splice(toIndex, 0, character);
        orderedCharacters.forEach((item, index) => {
            item.layer = clamp(orderedCharacters.length - index, 1, MAX_LAYER);
        });
        renderAll();
    }

    function addFiles(files) {
        Array.from(files).forEach((file, index) => {
            const objectUrl = URL.createObjectURL(file);
            const cleanName = file.name.replace(/\.[^.]+$/, "");
            const id = `uploaded-${Date.now()}-${index}`;
            const character = {
                id,
                name: cleanName || "Character",
                src: objectUrl,
                objectUrl,
                naturalWidth: 1,
                naturalHeight: 1,
                heightMeters: 1.52,
                topPct: 0.05,
                bottomPct: 0.95,
                flipped: false,
                xPct: 50,
                layer: clamp(maxCharacterLayer() + 1, 1, MAX_LAYER)
            };

            const image = new Image();
            image.onload = () => {
                character.naturalWidth = image.naturalWidth || 1;
                character.naturalHeight = image.naturalHeight || 1;
                renderAll();
            };
            image.src = objectUrl;

            state.characters.push(character);
            state.selectedId = id;
        });

        renderAll();
    }

    document.addEventListener("click", (event) => {
        const unitButton = event.target.closest("[data-unit]");
        if (unitButton) {
            state.unit = unitButton.dataset.unit;
            renderAll();
            return;
        }

        const saveButton = event.target.closest("[data-save]");
        if (saveButton) {
            syncSavePayload();
            markSaveReady();
            return;
        }

        const moveButton = event.target.closest("[data-move]");
        if (moveButton) {
            moveCharacterLayer(moveButton.dataset.characterId, moveButton.dataset.move);
            return;
        }

        const removeButton = event.target.closest("[data-remove]");
        if (removeButton) {
            removeCharacter(removeButton.dataset.remove);
            return;
        }

        const selectButton = event.target.closest("[data-select]");
        if (selectButton) {
            setSelected(selectButton.dataset.select);
        }
    });

    document.addEventListener("change", (event) => {
        if (event.target.matches("[data-upload]")) {
            addFiles(event.target.files);
            event.target.value = "";
        }

        if (event.target.matches("[data-flipped]")) {
            const character = selectedCharacter();
            if (!character) {
                return;
            }
            character.flipped = event.target.checked;
            renderAll();
        }
    });

    els.chartContent.addEventListener("pointermove", updateChartPointer);

    els.chartContent.addEventListener("pointerleave", () => {
        els.chartContent.style.cursor = "default";
        hideHoverMeasurementLine();
    });

    els.chartContent.addEventListener("click", (event) => {
        if (event.target.closest(".chart-label")) {
            return;
        }

        const hit = chartHitTest(event.clientX, event.clientY);
        if (!hit) {
            return;
        }

        event.preventDefault();
        event.stopPropagation();
        setSelected(hit.character.id);
    });

    document.addEventListener("input", (event) => {
        const character = selectedCharacter();
        if (!character) {
            return;
        }

        if (event.target.matches("[data-name]")) {
            character.name = event.target.value || "Character";
            renderDataOnly();
            return;
        }

        if (event.target.matches("[data-height-feet], [data-height-inches]")) {
            const feet = Number(document.querySelector("[data-height-feet]")?.value || 0);
            const inches = Number(document.querySelector("[data-height-inches]")?.value || 0);
            character.heightMeters = Math.max(1, Math.round(feet * 12 + inches)) / INCHES_PER_METER;
            renderDataOnly();
            return;
        }

        if (event.target.matches("[data-height-meters]")) {
            const meters = Number(event.target.value || 0);
            character.heightMeters = Math.max(0.01, meters);
            renderDataOnly();
            return;
        }

        if (event.target.matches("[data-x-position]")) {
            character.xPct = clamp(Number(event.target.value) || 0, 0, 100);
            const output = document.getElementById("xPct");
            if (output) {
                output.textContent = `${Math.round(character.xPct)}%`;
            }
            renderDataOnly();
            return;
        }

        if (event.target.matches("[data-calibration]")) {
            setCalibration(character, event.target.dataset.calibration, Number(event.target.value) / 100);
            updateCalibrationUi(character);
            renderDataOnly();
        }
    });

    document.addEventListener("pointerdown", (event) => {
        const marker = event.target.closest("[data-marker]");
        const frame = event.target.closest("[data-calibration-frame]");
        const character = selectedCharacter();

        if (!marker || !frame || !character) {
            return;
        }

        event.preventDefault();
        marker.setPointerCapture(event.pointerId);

        const moveMarker = (moveEvent) => {
            const rect = frame.getBoundingClientRect();
            const pct = (moveEvent.clientY - rect.top) / Math.max(1, rect.height);
            setCalibration(character, marker.dataset.marker, pct);
            updateCalibrationUi(character);
            renderDataOnly();
        };

        const stopDragging = () => {
            marker.removeEventListener("pointermove", moveMarker);
            marker.removeEventListener("pointerup", stopDragging);
            marker.removeEventListener("pointercancel", stopDragging);
        };

        marker.addEventListener("pointermove", moveMarker);
        marker.addEventListener("pointerup", stopDragging);
        marker.addEventListener("pointercancel", stopDragging);
        moveMarker(event);
    });

    window.addEventListener("resize", () => {
        renderChart();
    });

    syncSavePayload();
    renderAll();
</script>

</body>
</html>
