<!DOCTYPE html>
<html data-theme="black" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Character Name | MyOC</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/theme/black.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .justified-gallery {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        .justified-row {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            align-items: flex-start;
        }

        .justified-row img {
            display: block;
            flex: 0 0 auto;
            object-fit: contain;
        }

        .gallery-image {
            cursor: zoom-in;
        }

        .gallery-image:focus-visible {
            outline: 2px solid currentColor;
            outline-offset: 3px;
        }

        .nsfw-media {
            position: relative;
            overflow: hidden;
            flex: 0 0 auto;
        }

        .nsfw-media .gallery-image {
            filter: blur(28px) saturate(1.35);
            transform: scale(1.04);
            cursor: default;
        }

        .nsfw-media-warning {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.28);
            pointer-events: none;
        }
    </style>
</head>

<body class="min-h-screen bg-base-100 text-base-content">

<div class="navbar bg-base-200 border-b border-base-300 px-6">
    <div class="flex-1">
        <a class="text-xl font-bold">MyOC</a>
    </div>

    <div class="flex-none w-full max-w-md mx-6">
        <label class="input input-bordered w-full">
            <svg class="h-4 w-4 opacity-60"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M21 21l-4.35-4.35M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"/>
            </svg>
            <input
                    class="grow"
                    placeholder="Search characters, artists, tags..."
                    type="search"
            />
        </label>
    </div>

    <div class="flex-none">
        <details class="dropdown dropdown-end">
            <summary class="btn btn-ghost btn-circle avatar">
                <div class="w-10 rounded">
                    <img
                            alt="Profile"
                            src="https://razeth.monster/wp-content/uploads/2025/11/IMG_20250826_003046.jpg"
                    />
                </div>
            </summary>

            <ul class="menu dropdown-content bg-base-100 rounded-box z-50 mt-3 w-56 p-2 shadow">
                <li><a>Characters</a></li>
                <li><a>Settings</a></li>

                <div class="divider my-1"></div>

                <li><a class="text-error">Logout</a></li>
            </ul>
        </details>
    </div>
</div>
<main class="container relative mx-auto px-3 py-4 sm:px-0">

                  stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
            <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2"/>
        </svg>
    </a>

    <div class="mb-4 flex justify-center">
        <div class="flex items-center gap-3">
            <img
                    alt="Razeth profile photo"
                    class="h-12 w-12 rounded object-cover"
                    src="https://razeth.monster/wp-content/uploads/2025/11/IMG_20250826_003046.jpg"
            />
            <span class="text-lg font-light">razeth</span>
        </div>
    </div>

    <h1 class="mb-4 text-center text-6xl font-bold">Super long character name here</h1>
    <p class="mb-6 text-center font-light">Some text goes here. This is a lot of text that fits in this area,
        and is placeholder text that the user can write in here.</p>

    <section class="justified-gallery">
        <!-- Single image row -->
        <div class="justified-row">
            <div class="nsfw-media">
                <img
                        alt="Gallery image 1"
                        class="gallery-image"
                        data-description="Full reference sheet showing Razeth's core markings, colors, outfit notes, and profile details in one consolidated image."
                        data-nsfw="true"
                        data-title="Full Reference Sheet"
                        src="https://razeth.monster/wp-content/uploads/2026/04/razref.png"
                />
                <div aria-hidden="true" class="nsfw-media-warning">
                    <div>
                        <div class="mx-auto flex h-11 w-11 items-center justify-center rounded bg-base-100/35 text-base-content/80 backdrop-blur-md">

                                      stroke-width="2"/>

                        </div>
                        <p class="mt-3 text-xs font-medium text-base-content/80 sm:text-sm">change your account settings

                </div>
            </div>
        </div>

        <!-- Double image row -->
        <div class="justified-row">
            <img
                    alt="Wide gallery image"
                    class="gallery-image"
                    data-description="A compact head collage with several expressions and angles for quick facial reference."
                    data-title="Expression Head Collage"
                    src="https://razeth.monster/wp-content/uploads/2025/11/RazHeadCollage_MomobedaNov2025.png"
                    tabindex="0"
            />
            <img
                    alt="Tall gallery image"
                    class="gallery-image"
                    data-description="Full-color turnaround focused on the head design, horn shape, markings, and side profile."
                    data-title="Full-Color Head Turnaround"
                    src="https://razeth.monster/wp-content/uploads/2025/11/RazHeadTurnaround_MomobedaNov2025_FullColour.png"
                    tabindex="0"
            />
        </div>

        <!-- Triple image row -->
        <div class="justified-row">
            <img
                    alt="Gallery image 4"
                    class="gallery-image"
                    data-description="Line-only turnaround for checking the silhouette and construction without color distraction."
                    data-title="Line Art Head Turnaround"
                    src="https://razeth.monster/wp-content/uploads/2025/11/RazHeadTurnaround_MomobedaNov2025_LinesOnly.png"
                    tabindex="0"
            />
            <img
                    alt="Gallery image 5"
                    class="gallery-image"
                    data-description="Magazine-style portrait composition that frames Razeth as a polished character feature."

                    src="https://razeth.monster/wp-content/uploads/2025/11/Brown_Clean_Minimalist_Fashion_Magazine_Cover_Magazine_Cover_.png"

            <img
                    alt="Gallery image 6"
                    class="gallery-image"
                    data-description="Thigh-up flat-color sketch for outfit shape, body proportions, and relaxed standing posture."
                    data-title="Thigh-Up Flat Color Sketch"
                    src="https://razeth.monster/wp-content/uploads/2025/11/RazThighUpFlatColourSketch.png"
                    tabindex="0"
            />
        </div>

        <!-- Triple image row -->
        <div class="justified-row">
            <img
                    alt="Gallery image 4"
                    class="gallery-image"
                    data-description="Stylized character art with a loose pose and emphasis on personality over strict reference detail."
                    data-title="Stylized Character Pose"
                    src="https://razeth.monster/wp-content/uploads/2025/11/aze.png"
                    tabindex="0"
            />
            <img
                    alt="Gallery image 5"
                    class="gallery-image"
                    data-description="Scene artwork placing Razeth in a cave environment, useful for mood, scale, and lighting reference."
                    data-title="Cave Scene Illustration"
                    src="https://razeth.monster/wp-content/uploads/2025/11/Raz-cave.jpg"
                    tabindex="0"
            />
            <img
                    alt="Gallery image 6"
                    class="gallery-image"
                    data-description="Full illustration with another character, showing interaction, expression, and comparative scale."
                    data-title="Character Interaction"
                    src="https://razeth.monster/wp-content/uploads/2025/11/ran-and-twink-full.png"
                    tabindex="0"
            />
        </div>

        <!-- Double image row -->
        <div class="justified-row">
            <img
                    alt="Wide gallery image"
                    class="gallery-image"
                    data-description="Close-up hand reference showing claw shape, finger proportions, and color placement."
                    data-title="Hand Detail Reference"
                    src="https://razeth.monster/wp-content/uploads/2025/11/raz-hand.png"

            />
            <img
                    alt="Tall gallery image"

                    data-description="Commissioned full-body artwork that shows the character's overall silhouette and finished rendering style."

                    tabindex="0"

        <!-- Single image row -->
        <div class="justified-row last-row">
            <img
                    alt="Gallery image 1"
                    class="gallery-image"
                    data-description="Profile photo used as the account avatar and identity marker for this reference page."
                    data-title="Profile Photo"
                    src="https://razeth.monster/wp-content/uploads/2025/11/IMG_20250826_003046.jpg"
                    tabindex="0"
            />
        </div>
    </section>
</main>

<dialog class="modal backdrop:bg-black/75" id="gallery-lightbox">
    <div class="modal-box max-w-6xl border border-base-content/20 bg-base-200 p-0 shadow-2xl">
        <img alt="" class="max-h-[80vh] w-full object-contain" id="lightbox-image"/>
        <div class="space-y-2 p-4">
            <h2 class="text-xl font-semibold" id="lightbox-title"></h2>
        </div>
    </div>
    <form class="modal-backdrop" method="dialog">
        <button>close</button>
    </form>
</dialog>
</body>
<script>
    function openLightbox(image) {
        if (image.dataset.nsfw === 'true') {
            return;
        }

        const lightbox = document.getElementById('gallery-lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const lightboxTitle = document.getElementById('lightbox-title');

        lightboxImage.src = image.src;
        lightboxImage.alt = image.alt;
        lightboxTitle.textContent = image.dataset.title || image.alt;

        lightbox.showModal();
    }

    function initLightbox() {
        const images = Array.from(document.querySelectorAll('.gallery-image'));

        images.forEach(function (image) {
            if (image.dataset.nsfw === 'true') {
                return;
            }

            image.setAttribute('role', 'button');
            image.setAttribute('aria-label', 'Open ' + (image.dataset.title || image.alt));

            image.addEventListener('click', function () {
                openLightbox(image);
            });

            image.addEventListener('keydown', function (event) {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    openLightbox(image);
                }
            });
        });
    }

    function resizeJustifiedGallery() {
        const rows = Array.from(document.querySelectorAll('.justified-row'));
        const completedRowHeights = [];

        rows.forEach(function (row) {
            const images = Array.from(row.querySelectorAll('img'));

            if (images.length === 0) {
                return;
            }

            const rowStyles = window.getComputedStyle(row);
            const gap = parseFloat(rowStyles.columnGap) || 0;
            const totalGapWidth = gap * (images.length - 1);
            const containerWidth = row.clientWidth;
            const availableWidth = containerWidth - totalGapWidth;

            let totalAspectRatio = 0;

            images.forEach(function (image) {
                if (image.naturalWidth > 0 && image.naturalHeight > 0) {
                    totalAspectRatio += image.naturalWidth / image.naturalHeight;
                }
            });

            if (totalAspectRatio === 0) {
                return;
            }

            let rowHeight;

            if (row.classList.contains('last-row') && images.length === 1 && completedRowHeights.length > 0) {
                rowHeight = completedRowHeights.reduce(function (total, height) {
                    return total + height;
                }, 0) / completedRowHeights.length;
            } else {
                rowHeight = availableWidth / totalAspectRatio;
                completedRowHeights.push(rowHeight);
            }

            images.forEach(function (image) {
                const aspectRatio = image.naturalWidth / image.naturalHeight;

                image.style.width = rowHeight * aspectRatio + 'px';
                image.style.height = rowHeight + 'px';
            });
        });
    }

    function waitForGalleryImages(callback) {
        const images = Array.from(document.querySelectorAll('.justified-row img'));
        let loadedCount = 0;

        if (images.length === 0) {
            callback();
            return;
        }

        images.forEach(function (image) {
            if (image.complete && image.naturalWidth > 0) {
                loadedCount++;

                if (loadedCount === images.length) {
                    callback();
                }

                return;
            }

            image.addEventListener('load', function () {
                loadedCount++;

                if (loadedCount === images.length) {
                    callback();
                }
            });

            image.addEventListener('error', function () {
                loadedCount++;

                if (loadedCount === images.length) {
                    callback();
                }
            });
        });
    }

    waitForGalleryImages(resizeJustifiedGallery);
    initLightbox();

    window.addEventListener('resize', resizeJustifiedGallery);
</script>
</html>
