<!DOCTYPE html>
<html data-theme="black" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Search | MyOC</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/theme/black.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-base-100 text-base-content">

<div class="navbar bg-base-200 border-b border-base-300 px-6">
    <div class="flex-1">
        <a class="text-xl font-bold">MyOC</a>
    </div>

    <div class="flex-none w-full max-w-md mx-6">
        <label class="input input-bordered w-full">
            <svg class="h-4 w-4 opacity-60"
                 fill="none"
                 stroke="currentColor"
                 viewBox="0 0 24 24"
                 xmlns="http://www.w3.org/2000/svg">
                <path d="M21 21l-4.35-4.35M11 18a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"/>
            </svg>
            <input
                    class="grow"
                    placeholder="Search characters, artists, tags..."
                    type="search"
            />
        </label>
    </div>

    <div class="flex-none">
        <details class="dropdown dropdown-end">
            <summary class="btn btn-ghost btn-circle avatar">
                <div class="w-10 rounded-full">
                    <img
                            alt="Profile"
                            src="https://ui-avatars.com/api/?name=R&background=ff0000&color=ffffff"
                    />
                </div>
            </summary>

            <ul class="menu dropdown-content bg-base-100 rounded-box z-50 mt-3 w-56 p-2 shadow">
                <li><a>Characters</a></li>
                <li><a>Settings</a></li>

                <div class="divider my-1"></div>

                <li><a class="text-error">Logout</a></li>
            </ul>
        </details>
    </div>
</div>

<main class="container mx-auto px-3 py-4 sm:px-0">
    <section class="mb-6">
        <div class="flex flex-col gap-4 border-b border-base-300 pb-5 lg:flex-row lg:items-end lg:justify-between">
            <div>
                <p class="text-sm font-semibold uppercase tracking-widest text-primary">Search</p>
                <h1 class="mt-1 text-4xl font-bold sm:text-5xl">Results for "raz"</h1>
                <p class="mt-2 max-w-2xl text-sm opacity-70 sm:text-base">
                    Browse matching profiles and character pages.
                </p>
            </div>

            <div class="flex flex-wrap gap-2">
                <span class="badge badge-primary badge-lg">4 users</span>
                <span class="badge badge-secondary badge-lg">8 characters</span>
            </div>
        </div>
    </section>

    <section class="grid gap-8 lg:grid-cols-[minmax(280px,0.95fr)_minmax(0,1.6fr)]">
        <section aria-labelledby="users-heading">
            <div class="mb-3 flex items-center justify-between gap-3">
                <h2 id="users-heading" class="text-2xl font-bold">Users</h2>
            </div>

            <div class="grid gap-3">
                <a class="group flex items-center gap-3 rounded border border-base-300 bg-base-200 p-3 transition hover:border-primary hover:bg-base-300"
                   href="profile.html">
                    <img
                            alt="Razeth profile photo"
                            class="h-16 w-16 rounded object-cover"
                            src="https://razeth.monster/wp-content/uploads/2025/11/IMG_20250826_003046.jpg"
                    />
                    <div class="min-w-0 flex-1">
                        <h3 class="truncate text-lg font-bold leading-tight">razeth</h3>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <span class="badge badge-outline">12 characters</span>
                            <span class="badge badge-outline">148 uploads</span>
                        </div>
                    </div>
                </a>

                <a class="group flex items-center gap-3 rounded border border-base-300 bg-base-200 p-3 transition hover:border-primary hover:bg-base-300"
                   href="profile.html">
                    <img
                            alt="Momo profile avatar"
                            class="h-16 w-16 rounded object-cover"
                            src="https://ui-avatars.com/api/?name=Momo&background=0ea5e9&color=ffffff"
                    />
                    <div class="min-w-0 flex-1">
                        <h3 class="truncate text-lg font-bold leading-tight">momobeda</h3>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <span class="badge badge-outline">7 characters</span>
                            <span class="badge badge-outline">83 uploads</span>
                        </div>
                    </div>
                </a>

                <a class="group flex items-center gap-3 rounded border border-base-300 bg-base-200 p-3 transition hover:border-primary hover:bg-base-300"
                   href="profile.html">
                    <img
                            alt="Lazarus profile avatar"
                            class="h-16 w-16 rounded object-cover"
                            src="https://ui-avatars.com/api/?name=Lazarus&background=7c3aed&color=ffffff"
                    />
                    <div class="min-w-0 flex-1">
                        <h3 class="truncate text-lg font-bold leading-tight">laz</h3>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <span class="badge badge-outline">5 characters</span>
                            <span class="badge badge-outline">41 uploads</span>
                        </div>
                    </div>
                </a>

                <a class="group flex items-center gap-3 rounded border border-base-300 bg-base-200 p-3 transition hover:border-primary hover:bg-base-300"
                   href="profile.html">
                    <img
                            alt="Vyn profile avatar"
                            class="h-16 w-16 rounded object-cover"
                            src="https://ui-avatars.com/api/?name=Vyn&background=16a34a&color=ffffff"
                    />
                    <div class="min-w-0 flex-1">
                        <h3 class="truncate text-lg font-bold leading-tight">vyn</h3>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <span class="badge badge-outline">3 characters</span>
                            <span class="badge badge-outline">26 uploads</span>
                        </div>
                    </div>
                </a>
            </div>

            <div class="mt-4 flex justify-center">
                <button class="btn btn-outline" type="button">Load more users</button>
            </div>
        </section>

        <section aria-labelledby="characters-heading">
            <div class="mb-3 flex items-center justify-between gap-3">
                <h2 id="characters-heading" class="text-2xl font-bold">Characters</h2>
            </div>

            <div class="grid grid-cols-2 gap-3 sm:gap-5 md:grid-cols-3 xl:grid-cols-4">
                <a aria-label="View Razeth" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Razeth character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2025/11/IMG_20250826_003046.jpg"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">RAZETH</p>
                            <p class="truncate text-center text-sm opacity-60">by razeth</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Lazarus" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Lazarus character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2025/11/IMG_4235.jpg"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">LAZARUS</p>
                            <p class="truncate text-center text-sm opacity-60">by razeth</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Vyn" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Vyn character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2026/05/PXL_20260510_2034589602.jpg"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">VYN</p>
                            <p class="truncate text-center text-sm opacity-60">by vyn</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Kitty" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Kitty character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2025/11/0lm906.png"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">KITTY</p>
                            <p class="truncate text-center text-sm opacity-60">by momo</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Ivo" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Ivo character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2025/11/30015727_GFLg1ToY4aItHVU.png"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">IVO</p>
                            <p class="truncate text-center text-sm opacity-60">by razeth</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Absinthe" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Absinthe character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2025/11/30015182_iWL8fW5cnTAj24C.png"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">ABSINTHE</p>
                            <p class="truncate text-center text-sm opacity-60">by lazarus</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Luxor" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Luxor character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2026/04/luxor2x.png"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">LUXOR</p>
                            <p class="truncate text-center text-sm opacity-60">by razeth</p>
                        </figcaption>
                    </figure>
                </a>

                <a aria-label="View Ren" class="group block" href="character.html">
                    <figure>
                        <img
                                alt="Ren character thumbnail"
                                class="aspect-square w-full rounded object-cover transition group-hover:brightness-110"
                                src="https://razeth.monster/wp-content/uploads/2025/11/30019389_auAdvE2JzHPjM9X.jpg"
                        />
                        <figcaption class="mt-2">
                            <p class="truncate text-center font-bold">REN</p>
                            <p class="truncate text-center text-sm opacity-60">by momo</p>
                        </figcaption>
                    </figure>
                </a>
            </div>

            <div class="mt-6 flex justify-center">
                <button class="btn btn-outline" type="button">Load more characters</button>
            </div>
        </section>
    </section>
</main>

</body>
</html>
