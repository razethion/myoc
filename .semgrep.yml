rules:
  - id: myoc.sql.no-select-star
    message: Avoid SELECT *; list the needed columns explicitly.
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - "**/*.js"
        - "**/*.mjs"
        - "**/*.sql"
        - "**/*.ts"
        - "**/*.tsx"
    pattern-regex: (?i)\bselect\s+\*

  - id: myoc.api.no-direct-json-response
    message: API JSON responses must go through jsonResponse with an explicit Zod response schema.
    severity: ERROR
    languages:
      - javascript
      - typescript
    paths:
      include:
        - /src/routes/api/**/*.ts
        - /src/routes/api/**/*.tsx
        - /src/lib/auth/authorization.ts
        - /src/lib/http/csrf.ts
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
    pattern-either:
      - pattern: c.json(...)
      - pattern: Response.json(...)
      - pattern: new Response(JSON.stringify(...), ...)
      - pattern: new Response(JSON.stringify(...))
      - pattern: c.body(JSON.stringify(...), ...)
      - pattern: c.body(JSON.stringify(...))

  - id: myoc.routes.no-image-body-proxy
    message: Route handlers must not proxy body streams through the Worker; serve media from public R2 URLs or document a narrow exception.
    severity: ERROR
    languages:
      - javascript
      - typescript
    paths:
      include:
        - /src/routes/**/*.ts
        - /src/routes/**/*.tsx
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
    patterns:
      - pattern-either:
          - pattern: new Response($SOURCE.body, ...)
          - pattern: $C.body($SOURCE.body, ...)

  - id: myoc.routes.no-direct-image-response
    message: Route handlers must not return image bytes directly; return a public media URL instead.
    severity: ERROR
    languages:
      - javascript
      - typescript
    paths:
      include:
        - /src/routes/**/*.ts
        - /src/routes/**/*.tsx
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
    patterns:
      - pattern-either:
          - pattern: |
              new Response($BODY, { ..., headers: { ..., 'content-type': $CONTENT_TYPE, ... }, ... })
          - pattern: |
              new Response($BODY, { ..., headers: { ..., "content-type": $CONTENT_TYPE, ... }, ... })
          - pattern: |
              new Response($BODY, { ..., headers: { ..., 'Content-Type': $CONTENT_TYPE, ... }, ... })
          - pattern: |
              new Response($BODY, { ..., headers: { ..., "Content-Type": $CONTENT_TYPE, ... }, ... })
          - pattern: |
              $C.body($BODY, $STATUS, { ..., 'content-type': $CONTENT_TYPE, ... })
          - pattern: |
              $C.body($BODY, $STATUS, { ..., "content-type": $CONTENT_TYPE, ... })
          - pattern: |
              $C.body($BODY, $STATUS, { ..., 'Content-Type': $CONTENT_TYPE, ... })
          - pattern: |
              $C.body($BODY, $STATUS, { ..., "Content-Type": $CONTENT_TYPE, ... })
      - metavariable-regex:
          metavariable: $CONTENT_TYPE
          regex: (?i)^['"]image/
