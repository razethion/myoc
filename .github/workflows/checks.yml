name: Checks and Preview

on:
  pull_request:

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-deploy:
    name: Check and Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: npm run check

      - name: Build
        run: npm run build

      - name: Prepare preview alias
        id: preview
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          RAW_REF: ${{ github.head_ref }}
        run: |
          preview_alias="$(printf '%s' "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-63)"

          if [ -z "$preview_alias" ]; then
            preview_alias="preview"
          fi

          echo "preview_alias=$preview_alias" >> "$GITHUB_OUTPUT"

      - name: Upload branch preview
        if: ${{ steps.preview.outputs.preview_alias != '' }}
        run: npx wrangler versions upload --minify --preview-alias "${{ steps.preview.outputs.preview_alias }}" --message "GitHub Actions preview ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
