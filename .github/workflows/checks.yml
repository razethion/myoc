name: Checks and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-and-deploy:
    name: Check and Deploy
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and test
        run: npm run check

      - name: Build
        run: npm run build

      - name: Apply production D1 migrations
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: npx wrangler d1 migrations apply myoc-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        run: npx wrangler deploy --minify --message "GitHub Actions ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Prepare preview alias
        id: preview
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          preview_alias="myoc-pr-${PR_NUMBER}"

          echo "preview_alias=$preview_alias" >> "$GITHUB_OUTPUT"

      - name: Prepare preview D1 database
        id: preview-db
        if: ${{ steps.preview.outputs.preview_alias != '' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DB_NAME: myoc-pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          db_name="myoc-pr-${PR_NUMBER}"
          db_id="$(npx wrangler d1 list --json | node -e "
            let input = '';
            process.stdin.on('data', (chunk) => input += chunk);
            process.stdin.on('end', () => {
              const dbs = JSON.parse(input);
              const db = dbs.find((entry) => entry.name === process.env.DB_NAME);
              if (db) {
                process.stdout.write(db.uuid || db.id || '');
              }
            });
          " )"

          if [ -z "$db_id" ]; then
            npx wrangler d1 create "$db_name" --location enam

            db_id="$(npx wrangler d1 list --json | node -e "
              let input = '';
              process.stdin.on('data', (chunk) => input += chunk);
              process.stdin.on('end', () => {
                const dbs = JSON.parse(input);
                const db = dbs.find((entry) => entry.name === process.env.DB_NAME);
                if (!db) {
                  throw new Error('Created preview D1 database was not found');
                }
                process.stdout.write(db.uuid || db.id || '');
              });
            " )"
          fi

          cat > wrangler.preview.jsonc <<EOF
          {
            "name": "myoc",
            "main": "src/index.ts",
            "compatibility_date": "2026-06-10",
            "workers_dev": false,
            "assets": {
              "directory": "./public"
            },
            "d1_databases": [
              {
                "binding": "DB",
                "database_name": "$db_name",
                "database_id": "$db_id"
              }
            ]
          }
          EOF

          echo "db_name=$db_name" >> "$GITHUB_OUTPUT"
          echo "db_id=$db_id" >> "$GITHUB_OUTPUT"

      - name: Apply preview D1 migrations
        if: ${{ steps.preview-db.outputs.db_name != '' }}
        run: npx wrangler d1 migrations apply "${{ steps.preview-db.outputs.db_name }}" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed preview D1 database
        if: ${{ steps.preview-db.outputs.db_name != '' }}
        run: npx wrangler d1 execute "${{ steps.preview-db.outputs.db_name }}" --remote --file seeds/development.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload branch preview
        id: upload-preview
        if: ${{ steps.preview.outputs.preview_alias != '' }}
        run: |
          set -o pipefail

          npx wrangler versions upload --config wrangler.preview.jsonc --minify --preview-alias "${{ steps.preview.outputs.preview_alias }}" --message "GitHub Actions preview ${GITHUB_SHA}" 2>&1 | tee wrangler-preview.log

          preview_url="$(grep -Eo 'https://[^[:space:]]+' wrangler-preview.log | grep -m1 'workers.dev' | sed -E 's/[).,]+$//' || true)"

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL
        if: ${{ steps.upload-preview.outputs.preview_url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.upload-preview.outputs.preview_url }}
          PREVIEW_ALIAS: ${{ steps.preview.outputs.preview_alias }}
        with:
          script: |
            const marker = '<!-- myoc-preview-url -->'
            const body = `${marker}
            Cloudflare preview is ready:

            ${process.env.PREVIEW_URL}

            Preview alias: \`${process.env.PREVIEW_ALIAS}\`
            Commit: \`${context.sha}\``

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

  cleanup-preview-db:
    name: Cleanup Preview D1
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Delete preview D1 database
        env:
          DB_NAME: myoc-pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          db_exists="$(npx wrangler d1 list --json | node -e "
            let input = '';
            process.stdin.on('data', (chunk) => input += chunk);
            process.stdin.on('end', () => {
              const dbs = JSON.parse(input);
              const db = dbs.find((entry) => entry.name === process.env.DB_NAME);
              process.stdout.write(db ? 'yes' : 'no');
            });
          " )"

          if [ "$db_exists" = "yes" ]; then
            npx wrangler d1 delete "$DB_NAME" --skip-confirmation
          else
            echo "Preview D1 database $DB_NAME does not exist; nothing to delete."
          fi
