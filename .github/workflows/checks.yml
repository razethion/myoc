name: Checks and Deploy

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'closed' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run ci

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy-production:
    name: Deploy production
    needs: quality
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Check Docker
        run: docker info

      - name: Build assets
        run: npm run build

      - name: Migrate production D1
        run: npx wrangler d1 migrations apply myoc-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production Worker
        run: npx wrangler deploy --minify --message "GitHub Actions ${GITHUB_SHA}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    name: Deploy preview
    needs: quality
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Check Docker
        run: docker info

      - name: Prepare preview metadata
        id: preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          preview_alias="myoc-pr-${PR_NUMBER}"
          preview_container_name="myoc-docker-sharp-pr-${PR_NUMBER}"

          echo "preview_alias=$preview_alias" >> "$GITHUB_OUTPUT"
          echo "preview_container_name=$preview_container_name" >> "$GITHUB_OUTPUT"

      - name: Prepare preview D1 and config
        id: preview-db
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_ALIAS: ${{ steps.preview.outputs.preview_alias }}
          PREVIEW_CONTAINER_NAME: ${{ steps.preview.outputs.preview_container_name }}
          DB_NAME: myoc-pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          db_name="myoc-pr-${PR_NUMBER}"

          list_d1_databases() {
            if ! npx wrangler d1 list --json > d1-list.json; then
              echo "::error::Unable to list D1 databases. Check that CLOUDFLARE_API_TOKEN is valid and has D1 edit/read permissions for this account."
              exit 1
            fi
          }

          get_db_id() {
            node -e "
              const fs = require('node:fs');
              const dbs = JSON.parse(fs.readFileSync('d1-list.json', 'utf8'));
              const db = dbs.find((entry) => entry.name === process.env.DB_NAME);
              if (db) {
                process.stdout.write(db.uuid || db.id || '');
              }
            "
          }

          list_d1_databases
          db_id="$(get_db_id)"

          if [ -z "$db_id" ]; then
            npx wrangler d1 create "$db_name" --location enam

            list_d1_databases
            db_id="$(get_db_id)"

            if [ -z "$db_id" ]; then
              echo "::error::Created preview D1 database $db_name was not found in wrangler d1 list output."
              exit 1
            fi
          fi

          cat > wrangler.preview.jsonc <<EOF
          {
            "name": "$PREVIEW_ALIAS",
            "main": "src/index.ts",
            "compatibility_date": "2026-06-10",
            "workers_dev": true,
            "containers": [
              {
                "name": "$PREVIEW_CONTAINER_NAME",
                "class_name": "MyocDockerSharpContainer",
                "image": "./containers/myoc-docker-sharp/Dockerfile",
                "image_build_context": "./containers/myoc-docker-sharp",
                "instance_type": "standard-1",
                "max_instances": 1
              }
            ],
            "durable_objects": {
              "bindings": [
                {
                  "name": "MYOC_DOCKER_SHARP_CONTAINER",
                  "class_name": "MyocDockerSharpContainer"
                }
              ]
            },
            "migrations": [
              {
                "tag": "v1",
                "new_sqlite_classes": ["MyocDockerSharpContainer"]
              }
            ],
            "assets": {
              "directory": "./public"
            },
            "images": {
              "binding": "IMAGES",
              "remote": true
            },
            "vars": {
              "MEDIA_PUBLIC_BASE_URL": "https://m.dev.myoc.art"
            },
            "secrets": {
              "required": ["PREVIEW_PROCESSOR_TOKEN"]
            },
            "d1_databases": [
              {
                "binding": "DB",
                "database_name": "$db_name",
                "database_id": "$db_id"
              }
            ],
            "r2_buckets": [
              {
                "binding": "MEDIA_BUCKET",
                "bucket_name": "myoc-dev"
              }
            ]
          }
          EOF

          echo "db_name=$db_name" >> "$GITHUB_OUTPUT"
          echo "db_id=$db_id" >> "$GITHUB_OUTPUT"

      - name: Migrate preview D1
        run: npx wrangler d1 migrations apply "${{ steps.preview-db.outputs.db_name }}" --config wrangler.preview.jsonc --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed preview D1
        run: npx wrangler d1 execute "${{ steps.preview-db.outputs.db_name }}" --config wrangler.preview.jsonc --remote --file seeds/development.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview Worker
        id: upload-preview
        run: |
          set -euo pipefail
          trap 'rm -f preview-secrets.json' EXIT

          node -e "
            const fs = require('node:fs');
            const token = process.env.PREVIEW_PROCESSOR_TOKEN;
            if (!token) {
              console.error('PREVIEW_PROCESSOR_TOKEN GitHub secret is required for preview deploys.');
              process.exit(1);
            }
            fs.writeFileSync('preview-secrets.json', JSON.stringify({ PREVIEW_PROCESSOR_TOKEN: token }));
          "

          npx wrangler deploy --config wrangler.preview.jsonc --secrets-file preview-secrets.json --minify --message "GitHub Actions preview ${GITHUB_SHA}" 2>&1 | tee wrangler-preview.log

          preview_url="$(node -e "
            const fs = require('node:fs');
            const log = fs.readFileSync('wrangler-preview.log', 'utf8');
            const urls = [...log.matchAll(/https:\/\/[a-z0-9-]+\\.[a-z0-9-]+\\.workers\\.dev\\b/gi)].map((match) => match[0]);
            process.stdout.write(urls.at(-1) || '');
          ")"

          if [ -z "$preview_url" ]; then
            echo "::error::Wrangler deployed the preview Worker but did not print a workers.dev URL."
            echo "Wrangler log:"
            cat wrangler-preview.log || true
            exit 1
          fi

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_PROCESSOR_TOKEN: ${{ secrets.PREVIEW_PROCESSOR_TOKEN }}

      - name: Comment preview link
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          PREVIEW_URL: ${{ steps.upload-preview.outputs.preview_url }}
          PREVIEW_ALIAS: ${{ steps.preview.outputs.preview_alias }}
        with:
          script: |
            const marker = '<!-- myoc-preview-url -->'
            const body = `${marker}
            Cloudflare preview is ready:

            ${process.env.PREVIEW_URL}

            Preview alias: \`${process.env.PREVIEW_ALIAS}\`
            Commit: \`${context.sha}\``

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

  cleanup-preview:
    name: Cleanup preview deployment
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Delete preview D1
        env:
          DB_NAME: myoc-pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if ! npx wrangler d1 list --json > d1-list.json; then
            echo "::error::Unable to list D1 databases. Check that CLOUDFLARE_API_TOKEN is valid and has D1 edit/read permissions for this account."
            exit 1
          fi

          db_exists="$(node -e "
            const fs = require('node:fs');
            const dbs = JSON.parse(fs.readFileSync('d1-list.json', 'utf8'));
            const db = dbs.find((entry) => entry.name === process.env.DB_NAME);
            process.stdout.write(db ? 'yes' : 'no');
          " )"

          if [ "$db_exists" = "yes" ]; then
            npx wrangler d1 delete "$DB_NAME" --skip-confirmation
          else
            echo "Preview D1 database $DB_NAME does not exist; nothing to delete."
          fi

      - name: Delete preview Worker
        env:
          WORKER_NAME: myoc-pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if npx wrangler delete "$WORKER_NAME" --force; then
            echo "Deleted preview Worker $WORKER_NAME."
          else
            echo "Preview Worker $WORKER_NAME does not exist or could not be deleted; nothing to clean up."
          fi

      - name: Delete preview container
        env:
          CONTAINER_NAME: myoc-docker-sharp-pr-${{ github.event.pull_request.number }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          if ! npx wrangler containers list --per-page 100 --json > containers-list.json; then
            echo "::warning::Unable to list containers; preview container cleanup skipped."
            exit 0
          fi

          container_id="$(node -e "
            const fs = require('node:fs');
            const payload = JSON.parse(fs.readFileSync('containers-list.json', 'utf8'));
            const containers = Array.isArray(payload) ? payload : payload.result || payload.containers || [];
            const container = containers.find((entry) => entry.name === process.env.CONTAINER_NAME);
            process.stdout.write(container?.id || container?.uuid || container?.container_id || '');
          " )"

          if [ -n "$container_id" ]; then
            printf 'y\n' | npx wrangler containers delete "$container_id"
          else
            echo "Preview container $CONTAINER_NAME does not exist; nothing to delete."
          fi

      - name: Delete preview container image
        env:
          CONTAINER_IMAGE: myoc-docker-sharp-pr-${{ github.event.pull_request.number }}:worker
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            if npx wrangler containers images delete "$CONTAINER_IMAGE" --skip-confirmation; then
              echo "Deleted preview container image $CONTAINER_IMAGE."
              exit 0
            fi

            sleep 5
          done

          echo "Preview container image $CONTAINER_IMAGE does not exist or could not be deleted; nothing to clean up."
